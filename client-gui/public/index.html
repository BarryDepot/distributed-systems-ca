<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SHE - Secure Help Empower</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 30px auto;
        padding: 0 20px;
      }
      h1 {
        color: #4a3f6e;
      }
      section {
        border: 1px solid #ddd;
        padding: 16px;
        margin-bottom: 20px;
        border-radius: 6px;
      }
      label {
        display: block;
        margin: 8px 0;
      }
      input {
        padding: 6px;
        width: 250px;
      }
      button {
        padding: 8px 14px;
        margin-top: 10px;
        cursor: pointer;
      }
      pre {
        background: #f4f4f4;
        padding: 10px;
        border-radius: 4px;
        white-space: pre-wrap;
      }
      ul.alerts {
        list-style: none;
        padding: 0;
        max-height: 300px;
        overflow-y: auto;
      }
      ul.alerts li {
        padding: 8px;
        border-bottom: 1px solid #eee;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <h1>SHE - Secure Help Empower</h1>
    <p>Distributed safety and support services. Powered by gRPC.</p>

    <section>
      <h2>Safety Monitor - Check Location</h2>
      <form id="safety-form">
        <label
          >Location ID:
          <input type="text" id="locationId" value="MAYO_CASTLEBAR_ZONE3" />
        </label>
        <label
          >User ID:
          <input type="text" id="userId" value="USER_00452" />
        </label>
        <button type="submit">Check Safety</button>
      </form>
      <pre id="safety-result"></pre>
    </section>

    <section>
      <h2>Safety Monitor - Live Alerts</h2>
      <form id="alerts-form">
        <label
          >Region ID:
          <input type="text" id="regionId" value="MAYO_NORTH" />
        </label>
        <label
          >Min Severity (1-5):
          <input
            type="number"
            id="severityThreshold"
            value="3"
            min="1"
            max="5"
          />
        </label>
        <button type="submit" id="alerts-start">Start Alerts</button>
        <button type="button" id="alerts-stop" disabled>Stop</button>
      </form>
      <ul id="alerts-list" class="alerts"></ul>
    </section>

    <script>
      // unary safety check
      document
        .getElementById('safety-form')
        .addEventListener('submit', async (e) => {
          e.preventDefault();
          const locationId = document.getElementById('locationId').value;
          const userId = document.getElementById('userId').value;

          const resultEl = document.getElementById('safety-result');
          resultEl.textContent = 'Checking...';

          try {
            const res = await fetch('/api/safety/check', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ locationId, userId }),
            });
            const data = await res.json();
            resultEl.textContent = JSON.stringify(data, null, 2);
          } catch (err) {
            resultEl.textContent = 'Error: ' + err.message;
          }
        });

      // streaming alerts via SSE
      let alertSource = null;
      const startBtn = document.getElementById('alerts-start');
      const stopBtn = document.getElementById('alerts-stop');
      const list = document.getElementById('alerts-list');

      document.getElementById('alerts-form').addEventListener('submit', (e) => {
        e.preventDefault();

        const regionId = document.getElementById('regionId').value;
        const severityThreshold =
          document.getElementById('severityThreshold').value;

        if (alertSource) alertSource.close();
        list.innerHTML = '';

        alertSource = new EventSource(
          '/api/safety/alerts?regionId=' +
            encodeURIComponent(regionId) +
            '&severityThreshold=' +
            encodeURIComponent(severityThreshold),
        );

        alertSource.onmessage = (event) => {
          const alert = JSON.parse(event.data);
          const li = document.createElement('li');
          li.textContent =
            '[severity ' +
            alert.severity +
            '] ' +
            alert.description +
            ' (' +
            alert.timestamp +
            ')';
          list.prepend(li);
        };

        alertSource.onerror = () => {
          alertSource.close();
        };

        startBtn.disabled = true;
        stopBtn.disabled = false;
      });

      stopBtn.addEventListener('click', () => {
        if (alertSource) alertSource.close();
        alertSource = null;
        startBtn.disabled = false;
        stopBtn.disabled = true;
      });
    </script>
  </body>
</html>
